<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mailer - Envoi d'Emails en Masse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f0f0f0 0%, #555 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #141414 0%, #141414 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      padding: 30px;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .form-section h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #555;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .email-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      margin-top: 10px;
      background: #f9f9f9;
    }

    .email-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: white;
      border: 1px solid #eee;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .email-item button {
      background: #ff4757;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.3s;
    }

    .email-item button:hover {
      background: #ff3838;
    }

    .email-count {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }

    button {
      padding: 11px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-add {
      background: #667eea;
      color: white;
      width: 100%;
      margin-top: 14px;
    }

    .btn-add:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-send {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin-top: 20px;
    }

    .btn-send:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-send:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-clear {
      background: #f0f0f0;
      color: #666;
      width: 100%;
      margin-top: 10px;
    }

    .btn-clear:hover {
      background: #e0e0e0;
    }

    .preview-section {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #eee;
      margin-top: 15px;
    }

    .preview-section h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .status-section {
      margin-top: 30px;
      padding: 20px;
      background: #f0f7ff;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .status-item {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .status-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-right: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .status-success { background: #2ecc71; }
    .status-error { background: #ff4757; }
    .status-pending { background: #f39c12; }

    .progress-bar {
      margin-top: 15px;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .stat-box {
      background: white;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #eee;
    }

    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .hidden { display: none !important; }

    .error-message {
      background: #ffe0e0;
      border: 1px solid #ff4757;
      color: #d32f2f;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .success-message {
      background: #e0ffe0;
      border: 1px solid #2ecc71;
      color: #27ae60;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .template-info {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      color: #1565c0;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .template-info code {
      background: rgba(0,0,0,0.1);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .btn-load-template {
      background: #667eea;
      color: white;
      padding: 11px 20px;
      border-radius: 6px;
      font-weight: 600;
    }

    .btn-load-template:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .template-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .template-buttons button {
      flex: 1;
      min-width: 150px;
    }

    .btn-pdf {
      background: #1abc9c;
      color: white;
      padding: 11px 20px;
      border-radius: 6px;
      font-weight: 600;
    }

    .btn-pdf:hover {
      background: #16a085;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26, 188, 156, 0.4);
    }

    .preview-html {
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      overflow: auto;
      min-height: 300px;
      max-height: 500px;
    }

    .preview-html-content {
      padding: 15px;
    }

    .preview-html-content img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📧 Mailer Pro</h1>
      <p>Envoyez des emails en masse facilement</p>
    </div>

    <div class="content">
      <div class="form-section">
        <h2>Configuration</h2>
        <div id="message-container"></div>

        <div class="form-group">
          <label for="subject">Sujet de l'email *</label>
          <input type="text" id="subject" placeholder="Ex: FIM 2026" value="FIM 2026">
        </div>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee;">
          <h2>📧 Template Actif</h2>
          <div class="template-info">
            <strong>ℹ️ Template Utilisé:</strong> <code>template.html</code>
          </div>
          
          <div class="template-buttons">
            <button type="button" class="btn-load-template" onclick="loadTemplatePreview()">🔄 Charger l'aperçu</button>
            <button type="button" class="btn-pdf" onclick="printTemplatePDF()">🖨️ Impression PDF</button>
          </div>

          <div id="templatePreviewSection" style="display: none;">
            <div class="preview-section">
              <h3>📋 Aperçu du template.html</h3>
              <div class="preview-html">
                <div id="templatePreviewContent" class="preview-html-content">
                  <p style="color: #999; font-style: italic;">L'aperçu du template s'affichera ici...</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <h2 style="margin-top: 25px;">Destinataires</h2>

        <div class="form-group">
          <label for="email">Adresse email *</label>
          <input type="email" id="email" placeholder="exemple@gmail.com">
          <button class="btn-add" onclick="addEmail()">+ Ajouter un email</button>
        </div>

        <div class="form-group">
          <label for="cc">CC (Copie carbone)</label>
          <input type="email" id="cc" placeholder="cc@exemple.com (optionnel)" value="contact@bici.mg">
        </div>

        <div class="email-list" id="emailList"></div>
        <div class="email-count" id="emailCount">0 email(s) ajouté(s)</div>

        <button class="btn-clear" onclick="clearEmails()">Effacer tout</button>
        <button class="btn-send" id="sendBtn" onclick="sendEmails()">🚀 Envoyer les emails</button>
      </div>

      <div>
        <div class="status-section hidden" id="statusSection">
          <h3>📊 Statut d'envoi</h3>
          <div class="stats">
            <div class="stat-box">
              <div class="stat-number" id="statTotal">0</div>
              <div class="stat-label">Total</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" id="statSuccess">0</div>
              <div class="stat-label">Succès</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" id="statError">0</div>
              <div class="stat-label">Erreurs</div>
            </div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div id="statusList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let emails = [];
    let defaultTemplate = null;

    async function loadTemplatePreview() {
      try {
        const response = await fetch('/template');
        const data = await response.json();

        if (data.success) {
          defaultTemplate = data.template;
          const previewDiv = document.getElementById('templatePreviewContent');
          previewDiv.innerHTML = defaultTemplate;
          document.getElementById('templatePreviewSection').style.display = 'block';
          showMessage('✅ Template chargé avec succès!', 'success');
        } else {
          showMessage('❌ Erreur: ' + data.message, 'error');
        }
      } catch (error) {
        showMessage('❌ Erreur réseau: ' + error.message, 'error');
        console.error('Erreur:', error);
      }
    }

    function addEmail() {
      const emailInput = document.getElementById('email');
      const email = emailInput.value.trim();

      if (!email) {
        showMessage('Veuillez entrer une adresse email', 'error');
        return;
      }

      if (!isValidEmail(email)) {
        showMessage('Adresse email invalide', 'error');
        return;
      }

      if (emails.includes(email)) {
        showMessage('Cet email est déjà dans la liste', 'error');
        return;
      }

      emails.push(email);
      emailInput.value = '';
      updateEmailList();
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function updateEmailList() {
      const emailList = document.getElementById('emailList');
      const emailCount = document.getElementById('emailCount');

      emailList.innerHTML = emails.map((email, index) => `
        <div class="email-item">
          <span>${email}</span>
          <button onclick="removeEmail(${index})">Supprimer</button>
        </div>
      `).join('');

      emailCount.textContent = emails.length + ' email(s) ajouté(s)';
      document.getElementById('sendBtn').disabled = emails.length === 0;
    }

    function removeEmail(index) {
      emails.splice(index, 1);
      updateEmailList();
    }

    function clearEmails() {
      if (confirm('Êtes-vous sûr de vouloir effacer tous les emails?')) {
        emails = [];
        updateEmailList();
      }
    }

    function showMessage(text, type) {
      const container = document.getElementById('message-container');
      const className = type === 'error' ? 'error-message' : 'success-message';
      container.innerHTML = '<div class="' + className + '">' + text + '</div>';
      setTimeout(() => {
        container.innerHTML = '';
      }, 4000);
    }

    async function sendEmails() {
      const subject = document.getElementById('subject').value;
      const cc = document.getElementById('cc').value.trim();

      if (!subject) {
        showMessage('Le sujet est obligatoire', 'error');
        return;
      }

      if (!defaultTemplate) {
        showMessage('⚠️ Le template n\'est pas chargé. Cliquez sur "Charger l\'aperçu" d\'abord.', 'error');
        return;
      }

      if (emails.length === 0) {
        showMessage('Aucun email à envoyer', 'error');
        return;
      }

      document.getElementById('statusSection').classList.remove('hidden');
      const statusList = document.getElementById('statusList');
      statusList.innerHTML = '';

      let successCount = 0;
      let errorCount = 0;

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<div class="btn-content"><span class="loader"></span>Envoi en cours...</div>';

      document.getElementById('statTotal').textContent = emails.length;

      for (let i = 0; i < emails.length; i++) {
        const email = emails[i];
        const itemId = 'status-' + i;
        
        statusList.innerHTML += '<div class="status-item" id="' + itemId + '"><div class="status-icon status-pending">⏳</div><span>' + email + '</span></div>';

        try {
          const payload = {
            to: email,
            subject: subject,
            html: defaultTemplate
          };

          if (cc) {
            payload.cc = cc;
          }

          const response = await fetch('/send-email-custom', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (data.success) {
            document.getElementById(itemId).innerHTML = '<div class="status-icon status-success">✓</div><span>' + email + '</span>';
            successCount++;
          } else {
            document.getElementById(itemId).innerHTML = '<div class="status-icon status-error">✗</div><span>' + email + ' - ' + data.error + '</span>';
            errorCount++;
          }
        } catch (error) {
          document.getElementById(itemId).innerHTML = '<div class="status-icon status-error">✗</div><span>' + email + ' - Erreur réseau</span>';
          errorCount++;
        }

        const progress = ((i + 1) / emails.length) * 100;
        document.getElementById('progressFill').style.width = progress + '%';

        document.getElementById('statSuccess').textContent = successCount;
        document.getElementById('statError').textContent = errorCount;
      }

      sendBtn.disabled = false;
      sendBtn.innerHTML = '🚀 Envoyer les emails';
      showMessage(successCount + ' email(s) envoyé(s) avec succès!', 'success');
    }

    // Imprimer le template en PDF
    function printTemplatePDF() {
      if (!defaultTemplate) {
        showMessage('⚠️ Le template n\'est pas chargé. Cliquez sur "Charger l\'aperçu" d\'abord.', 'error');
        return;
      }

      // Créer une nouvelle fenêtre
      const printWindow = window.open('', '', 'height=600,width=800');
      printWindow.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title></title>');
      printWindow.document.write('<style>');
      printWindow.document.write('@page { margin: 0.3cm; padding: 0; size: A4; counter-increment: none; }');
      printWindow.document.write('@page :first { margin: 0.3cm; }');
      printWindow.document.write('@page :left { margin: 0.3cm; }');
      printWindow.document.write('@page :right { margin: 0.3cm; }');
      printWindow.document.write('* { margin: 0; padding: 0; }');
      printWindow.document.write('html, body { margin: 0; padding: 0; border: 0; }');
      printWindow.document.write('body { font-family: Arial, sans-serif; font-size: 11px; line-height: 1.4; color: #333; }');
      printWindow.document.write('img { max-width: 85%; height: auto; display: block; margin: 5px auto; }');
      printWindow.document.write('table { width: 100%; border-collapse: collapse; border-spacing: 0; margin: 3px 0; }');
      printWindow.document.write('td, th { padding: 2px 3px; margin: 0; font-size: 10px; line-height: 1.2; vertical-align: top; }');
      printWindow.document.write('tr { height: auto; }');
      printWindow.document.write('p { margin: 4px 0; padding: 0; font-size: 11px; line-height: 1.4; text-align: justify; }');
      printWindow.document.write('h1 { font-size: 14px; margin: 5px 0 3px 0; padding: 0; line-height: 1.2; font-weight: bold; }');
      printWindow.document.write('h2 { font-size: 12px; margin: 4px 0 2px 0; padding: 0; line-height: 1.2; font-weight: bold; }');
      printWindow.document.write('h3, h4, h5, h6 { font-size: 11px; margin: 3px 0 2px 0; padding: 0; line-height: 1.2; font-weight: bold; }');
      printWindow.document.write('li { margin: 2px 0 2px 15px; font-size: 10px; line-height: 1.3; }');
      printWindow.document.write('ul { margin: 3px 0; padding-left: 15px; }');
      printWindow.document.write('ol { margin: 3px 0; padding-left: 20px; }');
      printWindow.document.write('strong, b { font-weight: bold; }');
      printWindow.document.write('em, i { font-style: italic; }');
      printWindow.document.write('a { color: #0066cc; text-decoration: none; }');
      printWindow.document.write('button { background: #3f51b5; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: 600; font-size: 13px; cursor: pointer; display: inline-block; margin: 8px 0; }');
      printWindow.document.write('a[role="button"] { background: #3f51b5; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: 600; font-size: 13px; text-decoration: none; display: inline-block; margin: 8px 0; text-align: center; }');
      printWindow.document.write('.btn, input[type="button"], input[type="submit"] { background: #3f51b5; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: 600; font-size: 13px; cursor: pointer; }');
      printWindow.document.write('</style>');
      printWindow.document.write('</head><body>');
      printWindow.document.write(defaultTemplate);
      printWindow.document.write('</body></html>');
      printWindow.document.close();
      
      // Lancer l'impression après un court délai
      setTimeout(function() {
        printWindow.print();
        // Optionnel: fermer la fenêtre après impression
        // printWindow.close();
      }, 250);
    }

    document.getElementById('email').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addEmail();
    });

    updateEmailList();
  </script>
</body>
</html>
